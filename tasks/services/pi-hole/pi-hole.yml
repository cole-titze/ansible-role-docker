---
- name: Check if Pi-hole is installed
  ansible.builtin.command: which pihole
  register: pihole_installed
  changed_when: false
  failed_when: false

- name: Install Pi-hole
  block:
    - name: Download Pi-hole installer
      ansible.builtin.get_url:
        url: https://install.pi-hole.net
        dest: /tmp/pihole-install.sh
        mode: '0755'

    - name: Create Pi-hole config directory
      ansible.builtin.file:
        path: /etc/pihole
        state: directory
        mode: '0755'

    - name: Create Pi-hole unattended config
      ansible.builtin.copy:
        dest: /etc/pihole/setupVars.conf
        mode: '0644'
        content: |
          PIHOLE_INTERFACE=eth0
          PIHOLE_DNS_1=127.0.0.1#5335
          QUERY_LOGGING=true
          INSTALL_WEB_SERVER=true
          INSTALL_WEB_INTERFACE=true
          LIGHTTPD_ENABLED=true
          CACHE_SIZE=10000
          DNS_FQDN_REQUIRED=true
          DNS_BOGUS_PRIV=true
          DNSMASQ_LISTENING=local
          BLOCKING_ENABLED=true

    - name: Install Pi-hole unattended
      ansible.builtin.command: bash /tmp/pihole-install.sh --unattended
      become: true

    - name: Clean up installer
      ansible.builtin.file:
        path: /tmp/pihole-install.sh
        state: absent
  when: pihole_installed.rc != 0

- name: Update Pi-hole if already installed
  ansible.builtin.command: pihole -up
  become: true
  when: pihole_installed.rc == 0
